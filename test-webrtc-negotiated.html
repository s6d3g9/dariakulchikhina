<!DOCTYPE html>
<body><script>
  const pc1 = new RTCPeerConnection();
  const pc2 = new RTCPeerConnection();
  const dc1 = pc1.createDataChannel('test', { negotiated:true, id: 0 });
  const dc2 = pc2.createDataChannel('test', { negotiated:true, id: 0 });
  dc2.onmessage = (e) => console.log('dc2 got:', e.data);
  pc1.onicecandidate = e => e.candidate && pc2.addIceCandidate(e.candidate);
  pc2.onicecandidate = e => e.candidate && pc1.addIceCandidate(e.candidate);
  pc1.createOffer().then(o => pc1.setLocalDescription(o)).then(() => pc2.setRemoteDescription(pc1.localDescription)).then(() => pc2.createAnswer()).then(a => pc2.setLocalDescription(a)).then(() => pc1.setRemoteDescription(pc2.localDescription)).then(() => {
    setTimeout(() => {
      dc1.send('hello negotiated');
    }, 500);
  });
</script></body>
