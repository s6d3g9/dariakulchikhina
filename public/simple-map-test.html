<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Простой тест карты</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #map { width: 100%; height: 400px; border: 1px solid #ccc; margin: 20px 0; }
        .status { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .loading { background: #e3f2fd; color: #1976d2; }
        .success { background: #e8f5e8; color: #2e7d32; }
        .error { background: #ffeaea; color: #d32f2f; }
    </style>
</head>
<body>
    <h2>Тест Яндекс карт - простая страница</h2>
    <div id="status" class="status loading">🔄 Загрузка скрипта Яндекс карт...</div>
    <div id="map"></div>
    
    <script>
        const statusEl = document.getElementById('status')
        const mapEl = document.getElementById('map')
        
        function updateStatus(message, type = 'loading') {
            statusEl.textContent = message
            statusEl.className = `status ${type}`
            console.log('[MapTest]', message)
        }
        
        // Функция загрузки скрипта
        function loadScript() {
            return new Promise((resolve, reject) => {
                updateStatus('🔄 Загружаю скрипт api-maps.yandex.ru...')
                
                const script = document.createElement('script')
                script.src = 'https://api-maps.yandex.ru/2.1/?lang=ru_RU'
                script.type = 'text/javascript'
                
                script.onload = () => {
                    updateStatus('✅ Скрипт загружен, ждем ymaps...')
                    // Ждем когда ymaps станет доступен
                    let attempts = 0
                    const checkYmaps = () => {
                        attempts++
                        if (window.ymaps) {
                            updateStatus('🎯 ymaps найден, вызываем ready()...')
                            window.ymaps.ready(() => {
                                updateStatus('✅ ymaps.ready() выполнен, создаю карту!', 'success')
                                resolve()
                            })
                        } else if (attempts > 50) {
                            reject(new Error('Timeout waiting for ymaps'))
                        } else {
                            setTimeout(checkYmaps, 100)
                        }
                    }
                    checkYmaps()
                }
                
                script.onerror = (error) => {
                    updateStatus('❌ Ошибка загрузки скрипта', 'error')
                    reject(error)
                }
                
                document.head.appendChild(script)
            })
        }
        
        // Создание карты
        function createMap() {
            try {
                const map = new ymaps.Map(mapEl, {
                    center: [55.751574, 37.573856], // Москва
                    zoom: 10,
                    controls: ['zoomControl', 'geolocationControl']
                })
                
                // Добавляем метку
                const placemark = new ymaps.Placemark([55.751574, 37.573856], {
                    balloonContent: 'Карта работает отлично! 🎉'
                }, {
                    preset: 'islands#greenDotIcon'
                })
                
                map.geoObjects.add(placemark)
                
                updateStatus('🎉 Карта создана и работает!', 'success')
                
            } catch (error) {
                updateStatus('❌ Ошибка создания карты: ' + error.message, 'error')
                console.error('[MapTest] Map creation error:', error)
            }
        }
        
        // Запуск
        loadScript()
            .then(createMap)
            .catch(error => {
                updateStatus('❌ Критическая ошибка: ' + error.message, 'error')
                console.error('[MapTest] Critical error:', error)
            })
    </script>
</body>
</html>
